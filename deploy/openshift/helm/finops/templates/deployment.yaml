apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "finops.name" . }}
  labels: {{- include "finops.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels: {{- include "finops.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels: {{- include "finops.selectorLabels" . | nindent 8 }}
    spec:
      securityContext: {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: web
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          # The replicas must NOT each re-seed; only the seed Job seeds.
          env:
            - name: SEED_ON_START
              value: "0"
            {{- include "finops.env" . | nindent 12 }}
          ports:
            - containerPort: 8000
              name: http
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
          resources: {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: false  # /app/out is written at runtime (P-7)
            capabilities:
              drop: ["ALL"]
