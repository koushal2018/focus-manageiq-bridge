{{- if .Values.route.enabled }}
# OpenShift Route — the bank-native ingress (not an ALB Ingress; P-2).
# Front this with AnyBank's IdP via the cluster's OAuth/SSO integration so the
# dashboard is authenticated and private (production-architecture.md access).
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: {{ include "finops.name" . }}
  labels: {{- include "finops.labels" . | nindent 4 }}
spec:
  {{- if .Values.route.host }}
  host: {{ .Values.route.host | quote }}
  {{- end }}
  to:
    kind: Service
    name: {{ include "finops.name" . }}
  port:
    targetPort: http
  tls:
    termination: {{ .Values.route.tls.termination }}
    insecureEdgeTerminationPolicy: Redirect
{{- end }}
