# =============================================================
# FinOps console — Helm values. Fill image.repository + db.* from the
# Terraform outputs (ecr_repository_url, rds_endpoint, db_secret_arn).
# =============================================================

image:
  repository: ""          # <- ECR repo url from terraform output ecr_repository_url
  tag: "latest"           # pin to a digest/tag in real deploys
  pullPolicy: IfNotPresent

replicaCount: 2

# Database connection. Password is NOT here — it comes from the mounted
# secret below (G-1). Host/port/user/db are non-secret config.
db:
  mode: network           # P-6: same loader code as the PoC, network mode
  host: ""                # <- terraform output rds_endpoint
  port: "5432"
  user: "focus_app"
  name: "focus"
  # Name of the k8s Secret holding key `password`. Sync it from the
  # Secrets Manager ARN (terraform output db_secret_arn) via the
  # Secrets Store CSI driver or External Secrets Operator — do not paste
  # the password into values.
  passwordSecretName: "finops-db"
  passwordSecretKey: "password"

# Bedrock NL-query: off by default (fail-closed). Region/model must agree:
# us-east-1 → us.* inference profile (verified working for the PoC). For an
# in-Gulf posture switch to the global.* profile and clear residency (B-1).
bedrock:
  disabled: "1"
  region: "us-east-1"
  modelId: "us.anthropic.claude-sonnet-4-6"

# Tenant branding/currency (PKG-1). config/tenant.json is baked into the image;
# set these to rebrand a deploy WITHOUT rebuilding (env wins over the file).
# Leave blank to use the image's config/tenant.json as-is.
tenant:
  orgName: ""             # e.g. "AnyBank"
  productName: ""         # e.g. "CloudLens FinOps"
  # Reporting currency is pinned to USD today (the pipeline normalizes to USD;
  # PKG-2 tracks making it configurable). Leave blank; a non-USD value fails
  # loudly at startup rather than silently doing nothing. FX rates INTO USD
  # remain configurable in config/tenant.json (fx_to_reporting).
  reportingCurrency: ""

# App-layer Basic Auth on the (destructive) console — defence-in-depth behind
# the cluster Route / edge (CX-6). OFF unless enabled AND the secret exists.
basicAuth:
  enabled: false
  secretName: "finops-basic-auth"
  userKey: "user"
  passKey: "pass"

# Live ManageIQ collector (MIQ-1). Leave url blank to use the synthesized
# snapshot (no appliance). Set url + a secret with creds to collect live.
miq:
  url: ""                 # e.g. https://miq.internal/api ; blank = snapshot
  secretName: "finops-miq"
  userKey: "user"
  passKey: "pass"
  caBundlePath: ""        # path to a mounted CA PEM (G-6; never verify=False)

# Prometheus scrape (OBS-1). /metrics is unauthenticated but cluster-internal.
metrics:
  enabled: true
  port: "8000"
  path: "/metrics"

# Seed runs once as a Job (Helm hook) before the Deployment serves, so the
# DB is populated. In production the dispatcher runs on a schedule (a
# CronJob) instead of seeding synthetic data — see templates/cronjob.yaml.
seed:
  enabled: true           # pilot: seed synthetic data once
  schedule: "0 */6 * * *" # prod dispatcher cadence (CronJob)

route:
  enabled: true
  host: ""                # e.g. finops.apps.<cluster-domain>; blank = auto
  tls:
    termination: edge     # TLS terminated at the Route; private cluster

resources:
  requests:
    cpu: "250m"
    memory: "256Mi"
  limits:
    cpu: "1"
    memory: "512Mi"

# OpenShift assigns an arbitrary high UID (SCC restricted-v2). The image's
# writable dirs are group-0-writable (P-7) so this works without runAsUser.
podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault
