name: CI

# Gates every push/PR: syntax, the SQL-guard logic tests, and — with a real
# Postgres — the data-integrity tests that catch the B-6/B-7 currency/join
# bugs that shipped twice. Synthetic data only; no secrets, no cloud calls.
on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    # Ephemeral per-run DB password (SEC-7): unique to each run, dies with the
    # throwaway service container, never a fixed literal in the repo. Not a
    # repo secret on purpose — fork PRs don't receive secrets, and this CI
    # must stay runnable from forks (synthetic data, localhost-only service).
    env:
      FOCUS_PG_HOST: localhost
      FOCUS_PG_PORT: "5432"
      FOCUS_PG_USER: focus_app
      FOCUS_PG_PASS: ci-ephemeral-${{ github.run_id }}-${{ github.run_attempt }}
      FOCUS_PG_DB: focus
      BEDROCK_DISABLED: "1"   # AI layer stays off in CI — no cloud calls

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: focus_app
          POSTGRES_PASSWORD: ci-ephemeral-${{ github.run_id }}-${{ github.run_attempt }}
          POSTGRES_DB: focus
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U focus_app -d focus"
          --health-interval 10s --health-timeout 5s --health-retries 5

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt -r requirements-dev.txt

      - name: Syntax check (py_compile, whole tree)
        run: python -m compileall -q ai connectors db generators join normalizer onprem web

      - name: Apply schema
        run: PGPASSWORD="$FOCUS_PG_PASS" psql -h localhost -U focus_app -d focus -f db/schema.sql

      - name: Seed synthetic data
        run: python -m docker.seed

      - name: Run tests (logic + data integrity)
        run: python -m pytest tests/ -q
