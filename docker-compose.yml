# =============================================================
# AnyBank Multi-Cloud FinOps PoC — one-command stack
#   docker compose up --build
# Brings up Postgres + the web console, auto-seeds synthetic data,
# serves the dashboard on http://localhost:8000.
#
# Portable (SPEC §2): runs on a laptop, on-prem, or any AWS host.
# All data is synthetic. No real AnyBank data, no real cloud credentials.
# =============================================================
name: focus-manageiq-bridge

services:
  db:
    # ECR Public mirror of the Docker Official image — same portability
    # rationale as the Dockerfile base images (no Docker Hub rate limits).
    image: public.ecr.aws/docker/library/postgres:16
    container_name: anybank_finops_db
    environment:
      POSTGRES_USER: ${FOCUS_PG_USER:-focus_app}
      # No default password (SEC-7): compose fails fast with this message if
      # FOCUS_PG_PASS is unset. Demo value lives in .env.example only —
      # `cp .env.example .env` is now step 1 of the quickstart.
      POSTGRES_PASSWORD: "${FOCUS_PG_PASS:?FOCUS_PG_PASS is not set — run `cp .env.example .env`}"
      POSTGRES_DB: ${FOCUS_PG_DB:-focus}
    volumes:
      - finops_pgdata:/var/lib/postgresql/data
    # Bind to 127.0.0.1 ONLY — host-local dev convenience (Postgres MCP,
    # host-side pytest), never 0.0.0.0. Synthetic data, localhost only.
    ports:
      - "127.0.0.1:5432:5432"
    # Memory cap — a deliberate guard against the LM-1 class of problem
    # (a DB container is tiny; this just makes the ceiling explicit).
    mem_limit: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${FOCUS_PG_USER:-focus_app} -d ${FOCUS_PG_DB:-focus}"]
      interval: 5s
      timeout: 3s
      retries: 12
    restart: unless-stopped

  web:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: anybank_finops_web
    depends_on:
      db:
        condition: service_healthy
    environment:
      FOCUS_PG_MODE: network
      FOCUS_PG_HOST: db
      FOCUS_PG_PORT: "5432"
      FOCUS_PG_USER: ${FOCUS_PG_USER:-focus_app}
      FOCUS_PG_PASS: "${FOCUS_PG_PASS:?FOCUS_PG_PASS is not set — run `cp .env.example .env`}"
      FOCUS_PG_DB: ${FOCUS_PG_DB:-focus}
      # AI layer: the stack runs fully without Bedrock. Default OFF; flip
      # BEDROCK_DISABLED=0 (e.g. in .env) to enable the NL-query free-text
      # path. Region/model default to the us-east-1 inference profile that
      # this account's role can invoke; me-central-1 prod uses a global.
      # profile and is residency-gated (GOTCHA B-1).
      BEDROCK_DISABLED: ${BEDROCK_DISABLED:-1}
      BEDROCK_REGION: ${BEDROCK_REGION:-us-east-1}
      BEDROCK_MODEL_ID: ${BEDROCK_MODEL_ID:-us.anthropic.claude-sonnet-4-6}
      # boto3 picks up the EC2 instance role via IMDS automatically; no
      # static keys baked in. AWS_REGION set so the SDK has a default.
      AWS_REGION: ${BEDROCK_REGION:-us-east-1}
      SEED_ON_START: "1"
      FOCUS_GEN_SCALE: ${FOCUS_GEN_SCALE:-8}
    ports:
      - "${WEB_PORT:-8000}:8000"
    # Persist out/ (source registry + upload inboxes) so uploaded data survives
    # a container recreate: the seed re-dispatches the persisted inboxes, and
    # since an upload source's partition is a pure function of its inbox, the
    # warehouse is rebuilt identically. Without this, `docker compose up` after
    # a recreate would silently drop every uploaded source. (review finding)
    volumes:
      - finops_out:/app/out
    restart: unless-stopped

volumes:
  finops_pgdata:
  finops_out:
