<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{% block title %}ENBD &middot; FinOps PoC{% endblock %}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<!-- Typography: Fraunces (display serif, variable), Inter (body, variable),
     JetBrains Mono (data + SQL). All three are open / SIL OFL. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght,SOFT,WONK@9..144,300..900,0..100,0..1&family=Inter:wght@300..700&family=JetBrains+Mono:wght@300..600&display=swap">
<style>
  :root {
    --bg-deep:     #0b0f1e;
    --bg-rise:     #141a2f;
    --bg-rise-2:   #1a223c;
    --bg-glass:    rgba(255, 255, 255, 0.04);
    --bg-glass-2:  rgba(255, 255, 255, 0.07);
    --ink-bright:  #f1f5fb;
    --ink-quiet:   #8b95ad;
    --ink-faint:   #5a6479;
    --seam:        rgba(255, 255, 255, 0.06);
    --seam-strong: rgba(255, 255, 255, 0.12);

    --molten-1:    #6ee7c2;
    --molten-2:    #46c4ff;
    --molten-3:    #b78cff;
    --molten:      linear-gradient(120deg, var(--molten-1) 0%, var(--molten-2) 55%, var(--molten-3) 100%);

    --good-jade:   #5fd1a4;
    --warn-amber:  #f5b06b;
    --bad-rust:    #e57b6e;
    --info-sky:    #82b4ff;

    --good-bg:     rgba(95, 209, 164, 0.08);
    --warn-bg:     rgba(245, 176, 107, 0.08);
    --bad-bg:      rgba(229, 123, 110, 0.08);
    --info-bg:     rgba(130, 180, 255, 0.08);

    --radius-lg:   28px;
    --radius-md:   18px;
    --radius-sm:   10px;

    --ease-settle: cubic-bezier(.22, 1, .36, 1);
    --ease-glide:  cubic-bezier(.45, 0, .55, 1);

    --pad-page:    clamp(20px, 4vw, 56px);
    --col-read:    min(980px, 100% - 2 * var(--pad-page));
  }

  * { box-sizing: border-box; }

  /* The atmosphere: a slow molten breath in the background. Two off-screen
     blobs rotate hue slightly over 24s; everything else sits above this. */
  html, body {
    margin: 0;
    padding: 0;
    background: var(--bg-deep);
    color: var(--ink-bright);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    font-weight: 380;
    font-size: 15px;
    line-height: 1.55;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
  }

  body::before, body::after {
    content: "";
    position: fixed;
    inset: -20%;
    z-index: -2;
    pointer-events: none;
    background: radial-gradient(closest-side at 22% 28%, rgba(110, 231, 194, 0.18), transparent 70%),
                radial-gradient(closest-side at 78% 72%, rgba(70, 196, 255, 0.14), transparent 70%);
    filter: blur(60px);
    animation: breathe 28s var(--ease-glide) infinite;
  }
  body::after {
    background: radial-gradient(closest-side at 70% 20%, rgba(183, 140, 255, 0.10), transparent 70%);
    animation-duration: 36s;
    animation-direction: reverse;
  }
  @keyframes breathe {
    0%, 100% { transform: translate3d(0, 0, 0) rotate(0deg); }
    50%      { transform: translate3d(-2%, 2%, 0) rotate(4deg); }
  }

  /* Grain overlay — barely perceptible, but kills banding on the gradients. */
  body::before {
    /* re-uses ::before for the grain layer ON TOP of the blobs; instead we
       leave grain to a CSS data-uri layer on .page-grain (added below). */
  }

  /* === LAYOUT === */
  .top {
    position: sticky; top: 0; z-index: 30;
    backdrop-filter: blur(18px) saturate(1.6);
    -webkit-backdrop-filter: blur(18px) saturate(1.6);
    background: rgba(11, 15, 30, 0.55);
    border-bottom: 1px solid var(--seam);
  }
  .top-inner {
    width: var(--col-read);
    margin: 0 auto;
    padding: 14px 0;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .brand {
    font-family: 'Fraunces', serif;
    font-variation-settings: "opsz" 14, "wght" 600, "SOFT" 50;
    font-size: 17px;
    letter-spacing: -0.01em;
    color: var(--ink-bright);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 10px;
  }
  .brand-mark {
    width: 22px; height: 22px;
    border-radius: 50%;
    background: var(--molten);
    box-shadow: 0 0 24px rgba(70, 196, 255, 0.45);
    flex: none;
    animation: pulse 4.2s var(--ease-glide) infinite;
  }
  @keyframes pulse {
    0%, 100% { transform: scale(1); filter: hue-rotate(0deg); }
    50%      { transform: scale(1.05); filter: hue-rotate(10deg); }
  }
  .demo-ribbon {
    margin-left: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    font-weight: 500;
    color: var(--warn-amber);
    background: var(--warn-bg);
    padding: 4px 9px;
    border-radius: 999px;
    letter-spacing: 0.06em;
    text-transform: uppercase;
    border: 1px solid rgba(245, 176, 107, 0.2);
  }
  .nav {
    margin-left: auto;
    display: flex;
    gap: 4px;
  }
  .nav a {
    color: var(--ink-quiet);
    text-decoration: none;
    padding: 7px 14px;
    border-radius: 999px;
    font-size: 13px;
    transition: color .2s var(--ease-glide), background .2s var(--ease-glide);
  }
  .nav a:hover { color: var(--ink-bright); background: var(--bg-glass); }
  .nav a.active {
    color: var(--ink-bright);
    background: var(--bg-glass-2);
    box-shadow: inset 0 0 0 1px var(--seam-strong);
  }

  main {
    width: var(--col-read);
    margin: 0 auto;
    padding: 56px 0 96px 0;
  }

  /* === DISPLAY HEADINGS === */
  h1.display {
    font-family: 'Fraunces', serif;
    font-variation-settings: "opsz" 144, "wght" 480, "SOFT" 30, "WONK" 0;
    font-size: clamp(48px, 8vw, 88px);
    line-height: 0.96;
    letter-spacing: -0.035em;
    margin: 0 0 12px 0;
    max-width: 14ch;
  }
  h1.display em {
    font-style: italic;
    font-variation-settings: "opsz" 144, "wght" 380, "SOFT" 80, "WONK" 1;
    background: var(--molten);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  p.lede {
    font-size: clamp(16px, 1.6vw, 19px);
    color: var(--ink-quiet);
    max-width: 56ch;
    margin: 0 0 48px 0;
    font-weight: 380;
  }
  h2.section {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-faint);
    margin: 56px 0 16px 0;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  h2.section::after {
    content: "";
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg, var(--seam-strong), transparent);
  }

  /* === LOZENGES (tiles) === */
  .lozenge {
    background: var(--bg-rise);
    border-radius: var(--radius-lg);
    border: 1px solid var(--seam);
    padding: 26px 28px;
    position: relative;
    overflow: hidden;
    transition: transform .35s var(--ease-settle), border-color .35s var(--ease-settle);
  }
  .lozenge::before {
    content: "";
    position: absolute;
    inset: 0;
    border-radius: inherit;
    padding: 1px;
    background: var(--molten);
    -webkit-mask: linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite: xor;
    mask-composite: exclude;
    opacity: 0;
    transition: opacity .5s var(--ease-settle);
    pointer-events: none;
  }
  .lozenge:hover::before { opacity: 1; }
  .lozenge:hover { transform: translateY(-2px); }

  /* === STAT TILES === */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
    gap: 14px;
    margin-bottom: 24px;
  }
  .stat {
    padding: 24px 26px 22px;
  }
  .stat .value {
    font-family: 'Fraunces', serif;
    font-variation-settings: "opsz" 144, "wght" 380, "SOFT" 50;
    font-size: 56px;
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--ink-bright);
    display: block;
    margin-bottom: 8px;
  }
  .stat .value em {
    font-style: italic;
    font-variation-settings: "opsz" 144, "wght" 300, "SOFT" 80, "WONK" 1;
    background: var(--molten);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .stat .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: var(--ink-faint);
    display: block;
    margin-bottom: 4px;
  }
  .stat .note {
    font-size: 12.5px;
    color: var(--ink-quiet);
    line-height: 1.45;
  }

  /* === BANNERS === */
  .banner {
    border-radius: var(--radius-md);
    padding: 14px 18px;
    margin-bottom: 22px;
    font-size: 13.5px;
    line-height: 1.55;
    display: flex;
    gap: 12px;
    align-items: flex-start;
    position: relative;
  }
  .banner .verdict {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 999px;
    flex: none;
    margin-top: 1px;
  }
  .banner.good   { background: var(--good-bg); color: var(--ink-bright); border: 1px solid rgba(95,209,164,0.16); }
  .banner.good   .verdict { color: var(--good-jade); background: rgba(95,209,164,0.12); }
  .banner.warn   { background: var(--warn-bg); color: var(--ink-bright); border: 1px solid rgba(245,176,107,0.16); }
  .banner.warn   .verdict { color: var(--warn-amber); background: rgba(245,176,107,0.12); }
  .banner.bad    { background: var(--bad-bg);  color: var(--ink-bright); border: 1px solid rgba(229,123,110,0.18); }
  .banner.bad    .verdict { color: var(--bad-rust); background: rgba(229,123,110,0.14); }
  .banner.info   { background: var(--info-bg); color: var(--ink-bright); border: 1px solid rgba(130,180,255,0.18); }
  .banner.info   .verdict { color: var(--info-sky); background: rgba(130,180,255,0.14); }
  .banner code   { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-bright); }

  /* === TABLES === */
  .table-wrap { border-radius: var(--radius-md); overflow: hidden; border: 1px solid var(--seam); background: var(--bg-rise); margin-bottom: 28px; }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    padding: 12px 16px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    font-weight: 500;
    background: var(--bg-rise-2);
    border-bottom: 1px solid var(--seam);
  }
  tbody td {
    padding: 13px 16px;
    border-bottom: 1px solid var(--seam);
    font-size: 13.5px;
    vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: 0; }
  tbody tr:hover td { background: var(--bg-glass); }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.muted { color: var(--ink-quiet); }
  td.mono { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-quiet); }

  /* === PILLS (used inside tables & join status) === */
  .pill {
    display: inline-block;
    padding: 3px 10px;
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.1em;
    font-weight: 500;
  }
  .pill.matched              { background: rgba(95,209,164,0.14);  color: var(--good-jade); }
  .pill.unmatched_focus_only { background: rgba(245,176,107,0.14); color: var(--warn-amber); }
  .pill.unmatched_miq_only   { background: rgba(130,180,255,0.14); color: var(--info-sky); }
  .pill.no_resource_id       { background: rgba(255,255,255,0.06); color: var(--ink-quiet); }
  .pill.ambiguous            { background: rgba(229,123,110,0.14); color: var(--bad-rust); }
  .pill.rightsize            { background: rgba(245,176,107,0.14); color: var(--warn-amber); }
  .pill.memory-bound         { background: rgba(229,123,110,0.14); color: var(--bad-rust); }

  /* === JOIN BARS === */
  .join-bar {
    display: grid;
    grid-template-columns: 180px 1fr 60px;
    align-items: center;
    gap: 18px;
    margin-bottom: 10px;
  }
  .join-bar .name { font-family: 'JetBrains Mono', monospace; font-size: 11.5px; color: var(--ink-quiet); text-transform: uppercase; letter-spacing: 0.08em; }
  .join-bar .track {
    height: 8px;
    border-radius: 999px;
    background: rgba(255,255,255,0.04);
    overflow: hidden;
    position: relative;
  }
  .join-bar .fill {
    height: 100%;
    border-radius: inherit;
    background: var(--molten);
    transform-origin: left center;
    animation: fillIn 1.1s var(--ease-settle) both;
  }
  .join-bar .count { font-family: 'Fraunces', serif; font-variation-settings: "opsz" 36, "wght" 380; font-size: 22px; color: var(--ink-bright); text-align: right; }
  @keyframes fillIn { from { transform: scaleX(0); } to { transform: scaleX(1); } }

  /* === REQUIREMENT CARDS === */
  .req-grid {
    display: grid;
    grid-template-columns: 1fr;
    gap: 14px;
  }
  .req-card {
    display: grid;
    grid-template-columns: 64px 1fr auto;
    align-items: start;
    gap: 20px;
    padding: 24px 26px;
  }
  .req-card .num {
    font-family: 'Fraunces', serif;
    font-variation-settings: "opsz" 144, "wght" 300, "SOFT" 80, "WONK" 1;
    font-style: italic;
    font-size: 56px;
    line-height: 1;
    background: var(--molten);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .req-card .body { padding-top: 6px; }
  .req-card h3 {
    font-family: 'Fraunces', serif;
    font-variation-settings: "opsz" 36, "wght" 520, "SOFT" 30;
    font-size: 20px;
    margin: 0 0 4px 0;
    letter-spacing: -0.01em;
  }
  .req-card .desc { color: var(--ink-quiet); font-size: 13.5px; max-width: 60ch; }
  .req-card .actions { padding-top: 8px; display: flex; flex-direction: column; gap: 6px; align-items: flex-end; }
  .req-card a { color: var(--molten-2); text-decoration: none; font-size: 13px; }
  .req-card a:hover { color: var(--molten-1); }

  /* === RISE-IN ANIMATION === */
  .rise { animation: riseIn .9s var(--ease-settle) both; }
  .rise.delay-1 { animation-delay: .08s; }
  .rise.delay-2 { animation-delay: .16s; }
  .rise.delay-3 { animation-delay: .24s; }
  .rise.delay-4 { animation-delay: .32s; }
  .rise.delay-5 { animation-delay: .4s; }
  @keyframes riseIn {
    from { transform: translateY(20px); opacity: 0; }
    to   { transform: translateY(0);    opacity: 1; }
  }

  /* === MISC === */
  a.subtle { color: var(--molten-2); text-decoration: none; border-bottom: 1px solid transparent; transition: border-color .25s; }
  a.subtle:hover { border-bottom-color: var(--molten-2); }
  code, pre { font-family: 'JetBrains Mono', monospace; }
  pre.sql {
    background: var(--bg-rise);
    border: 1px solid var(--seam);
    border-radius: var(--radius-md);
    padding: 16px 18px;
    font-size: 12.5px;
    color: var(--ink-quiet);
    overflow-x: auto;
    margin: 12px 0 24px;
  }

  /* === FOOTER === */
  footer.foot {
    width: var(--col-read);
    margin: 0 auto;
    padding: 28px 0 40px;
    border-top: 1px solid var(--seam);
    color: var(--ink-faint);
    font-size: 12px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 12px;
  }
  footer.foot code { color: var(--ink-quiet); }

  /* === REDUCED MOTION === */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after { animation-duration: .01ms !important; animation-iteration-count: 1 !important; transition: none !important; }
    body::before, body::after { animation: none !important; }
  }

  /* === RESPONSIVE === */
  @media (max-width: 640px) {
    .req-card { grid-template-columns: 48px 1fr; }
    .req-card .actions { grid-column: 2; align-items: flex-start; padding-top: 6px; }
    .top-inner { flex-wrap: wrap; }
    .nav { width: 100%; overflow-x: auto; }
    .join-bar { grid-template-columns: 100px 1fr 40px; gap: 10px; }
  }
</style>
</head>
<body>
  <header class="top">
    <div class="top-inner">
      <a class="brand" href="/">
        <span class="brand-mark" aria-hidden="true"></span>
        ENBD &middot; FinOps
      </a>
      <span class="demo-ribbon">Synthetic data</span>
      <nav class="nav" aria-label="Primary">
        <a href="/"                  class="{% if active=='home'         %}active{% endif %}">Overview</a>
        <a href="/views/ai"          class="{% if active=='ai'           %}active{% endif %}">AI cost</a>
        <a href="/views/utilization" class="{% if active=='utilization'  %}active{% endif %}">Utilization</a>
        <a href="/views/cloud-vs-onprem" class="{% if active=='cloud-vs-onprem' %}active{% endif %}">Cloud &times; on-prem</a>
        <a href="/views/carbon"      class="{% if active=='carbon'       %}active{% endif %}">Carbon</a>
        <a href="/ai/"               class="{% if active=='ai-query'     %}active{% endif %}">NL query</a>
      </nav>
    </div>
  </header>
  <main>
    {% block content %}{% endblock %}
  </main>
  <footer class="foot">
    <span>Throwaway PoC built for the ENBD EBA innovation sprint. The deliverable is <code>GOTCHAS.md</code>, not this UI.</span>
    <span>No real ENBD data.</span>
  </footer>
</body>
</html>
