<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>{% block title %}ENBD &middot; FinOps PoC{% endblock %}</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<!--
  Aurora UI direction. Northern-lights mesh canvas, glass only on the
  signature Verdict Ribbon. Typography pairs Cormorant Garamond (display,
  italic moments) with DM Sans (body) and JetBrains Mono (data).
-->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400;1,500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600&family=JetBrains+Mono:wght@300..600&display=swap">
<style>
  :root {
    /* === NIGHT === */
    --night-deep:   #06080f;
    --night-rise:   #0c1220;
    --night-rise-2: #131a2c;
    --night-edge:   rgba(255, 255, 255, 0.06);
    --night-edge-2: rgba(255, 255, 255, 0.12);

    /* === AURORA === */
    --aurora-jade:   #4be8a8;
    --aurora-cyan:   #4ec0ff;
    --aurora-violet: #a36bff;
    --aurora-rose:   #ff7eb6;

    /* === INK === */
    --ink-aurora:    #e6f0ff;
    --ink-quiet:     #8a96b0;
    --ink-faint:     #555f78;

    /* === GLASS === */
    --glass:         rgba(230, 240, 255, 0.04);
    --glass-2:       rgba(230, 240, 255, 0.07);
    --glass-edge:    rgba(230, 240, 255, 0.12);

    /* === VERDICTS === */
    --good-glow:     rgba(75, 232, 168, 0.5);
    --warn-glow:     rgba(255, 184, 107, 0.5);
    --bad-glow:      rgba(255, 126, 182, 0.5);
    --info-glow:     rgba(78, 192, 255, 0.5);

    --good:          #4be8a8;
    --warn:          #ffb86b;
    --bad:           #ff7eb6;
    --info:          #4ec0ff;

    --good-bg:       rgba(75, 232, 168, 0.07);
    --warn-bg:       rgba(255, 184, 107, 0.07);
    --bad-bg:        rgba(255, 126, 182, 0.07);
    --info-bg:       rgba(78, 192, 255, 0.07);

    --radius-lg:     22px;
    --radius-md:     14px;
    --radius-sm:     8px;

    --ease-settle:   cubic-bezier(.22, 1, .36, 1);
    --ease-glide:    cubic-bezier(.45, 0, .55, 1);

    --pad-page:      clamp(20px, 4vw, 64px);
    --col-read:      min(1080px, 100% - 2 * var(--pad-page));
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    padding: 0;
    background: var(--night-deep);
    color: var(--ink-aurora);
    font-family: 'DM Sans', system-ui, sans-serif;
    font-weight: 380;
    font-size: 15px;
    line-height: 1.55;
    letter-spacing: -0.005em;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
    text-rendering: optimizeLegibility;
    overflow-x: hidden;
    min-height: 100vh;
  }

  /* === AURORA MESH ===
     Two large radial gradients drift out of phase. Composed under
     everything via z-index: -3 / -2. A third static gradient anchors
     the page so the eye has somewhere to land. */
  .aurora-canvas {
    position: fixed;
    inset: -10%;
    z-index: -3;
    pointer-events: none;
    overflow: hidden;
  }
  .aurora-canvas::before,
  .aurora-canvas::after {
    content: "";
    position: absolute;
    inset: -20%;
    background:
      radial-gradient(closest-side at 18% 22%, rgba(75, 232, 168, 0.34), transparent 62%),
      radial-gradient(closest-side at 78% 28%, rgba(78, 192, 255, 0.28), transparent 60%),
      radial-gradient(closest-side at 50% 88%, rgba(163, 107, 255, 0.30), transparent 65%);
    filter: blur(80px);
    animation: aurora-drift-a 56s var(--ease-glide) infinite;
    will-change: transform;
  }
  .aurora-canvas::after {
    background:
      radial-gradient(closest-side at 70% 18%, rgba(75, 232, 168, 0.18), transparent 60%),
      radial-gradient(closest-side at 24% 78%, rgba(78, 192, 255, 0.22), transparent 62%),
      radial-gradient(closest-side at 92% 60%, rgba(255, 126, 182, 0.18), transparent 58%);
    animation: aurora-drift-b 40s var(--ease-glide) infinite;
    mix-blend-mode: screen;
    opacity: 0.85;
  }
  @keyframes aurora-drift-a {
    0%, 100% { transform: translate3d(0, 0, 0) rotate(0deg); }
    33%      { transform: translate3d(-4%, 3%, 0) rotate(2deg); }
    66%      { transform: translate3d(3%, -2%, 0) rotate(-2deg); }
  }
  @keyframes aurora-drift-b {
    0%, 100% { transform: translate3d(0, 0, 0) rotate(0deg) scale(1); }
    50%      { transform: translate3d(5%, -4%, 0) rotate(3deg) scale(1.05); }
  }

  /* Grain layer: 1px noise via tiny SVG data-uri, blended at low alpha.
     Kills banding on the gradient mesh and gives the night canvas tooth. */
  .aurora-grain {
    position: fixed;
    inset: 0;
    z-index: -2;
    pointer-events: none;
    opacity: 0.04;
    mix-blend-mode: overlay;
    background-image: url("data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 200 200'><filter id='n'><feTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='2' stitchTiles='stitch'/></filter><rect width='100%25' height='100%25' filter='url(%23n)' opacity='0.85'/></svg>");
  }
  /* Vignette at the page edges so attention pulls inward. */
  .aurora-vignette {
    position: fixed;
    inset: 0;
    z-index: -1;
    pointer-events: none;
    background: radial-gradient(120% 80% at 50% 50%, transparent 55%, rgba(6, 8, 15, 0.65) 100%);
  }

  /* === TOP BAR === */
  .top {
    position: sticky;
    top: 0;
    z-index: 40;
    backdrop-filter: blur(24px) saturate(1.6);
    -webkit-backdrop-filter: blur(24px) saturate(1.6);
    background: rgba(6, 8, 15, 0.45);
    border-bottom: 1px solid var(--night-edge);
  }
  .top-inner {
    width: var(--col-read);
    margin: 0 auto;
    padding: 14px 0;
    display: flex;
    align-items: center;
    gap: 18px;
  }
  .brand {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 500;
    font-size: 22px;
    letter-spacing: -0.01em;
    color: var(--ink-aurora);
    text-decoration: none;
    display: inline-flex;
    align-items: center;
    gap: 12px;
  }
  .brand-mark {
    width: 26px; height: 26px;
    border-radius: 50%;
    background:
      radial-gradient(closest-side at 30% 30%, var(--aurora-jade) 0%, transparent 60%),
      radial-gradient(closest-side at 70% 70%, var(--aurora-violet) 0%, transparent 65%),
      radial-gradient(closest-side at 50% 50%, var(--aurora-cyan) 0%, transparent 70%);
    box-shadow:
      0 0 28px rgba(78, 192, 255, 0.45),
      inset 0 0 12px rgba(255, 255, 255, 0.18);
    flex: none;
    animation: brand-shimmer 5.6s var(--ease-glide) infinite;
  }
  @keyframes brand-shimmer {
    0%, 100% { filter: hue-rotate(0deg) brightness(1);    transform: scale(1); }
    50%      { filter: hue-rotate(-10deg) brightness(1.1); transform: scale(1.04); }
  }
  .brand .small {
    font-family: 'JetBrains Mono', monospace;
    font-style: normal;
    font-weight: 400;
    font-size: 10.5px;
    color: var(--ink-quiet);
    text-transform: uppercase;
    letter-spacing: 0.16em;
    margin-left: 4px;
  }
  .demo-ribbon {
    margin-left: 4px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    color: var(--warn);
    background: var(--warn-bg);
    padding: 4px 9px;
    border-radius: 999px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    border: 1px solid rgba(255, 184, 107, 0.22);
  }
  .nav {
    margin-left: auto;
    display: flex;
    gap: 2px;
  }
  .nav a {
    color: var(--ink-quiet);
    text-decoration: none;
    padding: 8px 14px;
    border-radius: 999px;
    font-size: 13px;
    transition: color .25s var(--ease-glide), background .25s var(--ease-glide);
    position: relative;
  }
  .nav a:hover { color: var(--ink-aurora); }
  .nav a.active {
    color: var(--ink-aurora);
    background: var(--glass);
    box-shadow: inset 0 0 0 1px var(--glass-edge);
  }

  main {
    width: var(--col-read);
    margin: 0 auto;
    padding: 80px 0 120px 0;
    position: relative;
  }

  /* === DISPLAY === */
  h1.display {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: clamp(56px, 10vw, 124px);
    line-height: 0.92;
    letter-spacing: -0.025em;
    margin: 0 0 24px 0;
    max-width: 16ch;
    color: var(--ink-aurora);
  }
  h1.display em {
    font-style: italic;
    font-weight: 300;
    background: linear-gradient(110deg,
      var(--aurora-jade) 0%,
      var(--aurora-cyan) 45%,
      var(--aurora-violet) 90%);
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
    /* slow hue cycle so the gradient feels truly auroral, not static */
    animation: ink-shimmer 18s var(--ease-glide) infinite;
  }
  @keyframes ink-shimmer {
    0%, 100% { filter: hue-rotate(0deg); }
    50%      { filter: hue-rotate(-12deg); }
  }
  p.lede {
    font-size: clamp(17px, 1.8vw, 21px);
    color: var(--ink-quiet);
    max-width: 56ch;
    margin: 0 0 64px 0;
    font-weight: 380;
    line-height: 1.5;
  }
  p.lede em {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 400;
    font-size: 1.15em;
    color: var(--ink-aurora);
  }
  h2.section {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    font-weight: 500;
    text-transform: uppercase;
    letter-spacing: 0.22em;
    color: var(--ink-faint);
    margin: 72px 0 24px 0;
    display: flex;
    align-items: center;
    gap: 14px;
  }
  h2.section::after {
    content: "";
    flex: 1;
    height: 1px;
    background: linear-gradient(90deg,
      var(--glass-edge) 0%,
      transparent 100%);
  }

  /* === GLASS PANEL (matte rise base) === */
  .panel {
    background: linear-gradient(180deg, var(--night-rise) 0%, var(--night-rise-2) 100%);
    border: 1px solid var(--night-edge);
    border-radius: var(--radius-lg);
    padding: 28px 30px;
    position: relative;
  }
  /* Hair of luminous edge along top of every panel */
  .panel::before {
    content: "";
    position: absolute;
    top: -1px;
    left: 16%;
    right: 16%;
    height: 1px;
    background: linear-gradient(90deg, transparent, var(--aurora-cyan) 30%, var(--aurora-jade) 70%, transparent);
    opacity: 0.45;
    border-radius: inherit;
  }

  /* === STAT TILES (panels, not glass) === */
  .stat-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 14px;
    margin-bottom: 24px;
  }
  .stat {
    padding: 28px 28px 24px;
  }
  .stat .label {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.18em;
    color: var(--ink-faint);
    display: block;
    margin-bottom: 12px;
  }
  .stat .value {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 300;
    font-size: 68px;
    line-height: 1;
    letter-spacing: -0.04em;
    color: var(--ink-aurora);
    display: block;
    margin-bottom: 12px;
  }
  .stat .value em {
    font-style: italic;
    background: linear-gradient(110deg, var(--aurora-jade), var(--aurora-cyan), var(--aurora-violet));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .stat .note {
    font-size: 12.5px;
    color: var(--ink-quiet);
    line-height: 1.5;
  }

  /* === THE AURORA VERDICT RIBBON ===
     The signature element. Four requirement nodes float above a single
     drifting aurora arc rendered with an SVG <linearGradient> ribbon. */
  .ribbon {
    position: relative;
    margin: 24px calc(var(--pad-page) * -1) 60px;
    padding: 56px 0 36px;
    min-height: 320px;
  }
  .ribbon-arc {
    position: absolute;
    inset: 0;
    pointer-events: none;
    overflow: hidden;
  }
  .ribbon-arc svg {
    position: absolute;
    inset: 0;
    width: 100%;
    height: 100%;
  }
  .ribbon-arc .arc-path {
    fill: none;
    stroke-width: 110;
    stroke-linecap: round;
    filter: blur(30px);
    opacity: 0.75;
  }
  .ribbon-arc .arc-path.glow {
    stroke-width: 220;
    filter: blur(50px);
    opacity: 0.32;
  }
  .ribbon-nodes {
    position: relative;
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 18px;
    width: var(--col-read);
    margin: 0 auto;
  }
  .node {
    position: relative;
    padding: 24px 22px 22px;
    border-radius: var(--radius-lg);
    background: var(--glass);
    border: 1px solid var(--glass-edge);
    backdrop-filter: blur(14px) saturate(1.4);
    -webkit-backdrop-filter: blur(14px) saturate(1.4);
    text-decoration: none;
    color: inherit;
    display: flex;
    flex-direction: column;
    gap: 12px;
    transition: transform .4s var(--ease-settle), border-color .4s, background .4s;
    overflow: hidden;
  }
  .node::before {
    /* the luminous top edge each node carries; color set by data-tone */
    content: "";
    position: absolute;
    top: -1px;
    left: 10%;
    right: 10%;
    height: 1px;
    background: currentColor;
    opacity: 0.6;
    box-shadow: 0 0 18px currentColor;
  }
  .node[data-tone="good"]  { color: var(--good);  }
  .node[data-tone="warn"]  { color: var(--warn);  }
  .node[data-tone="bad"]   { color: var(--bad);   }
  .node[data-tone="info"]  { color: var(--info);  }
  .node:hover {
    transform: translateY(-3px);
    background: var(--glass-2);
    border-color: rgba(230, 240, 255, 0.2);
  }
  .node .roman {
    font-family: 'Cormorant Garamond', serif;
    font-style: italic;
    font-weight: 300;
    font-size: 44px;
    line-height: 1;
    background: linear-gradient(135deg, var(--aurora-jade), var(--aurora-cyan), var(--aurora-violet));
    -webkit-background-clip: text;
    background-clip: text;
    color: transparent;
  }
  .node h3 {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 500;
    font-size: 22px;
    line-height: 1.1;
    margin: 0;
    letter-spacing: -0.01em;
    color: var(--ink-aurora);
    min-height: 2.2em;
  }
  .node .desc {
    font-size: 12.5px;
    color: var(--ink-quiet);
    line-height: 1.5;
    flex: 1;
  }
  .node .verdict {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10.5px;
    text-transform: uppercase;
    letter-spacing: 0.14em;
    color: currentColor;
  }
  .node .verdict::before {
    content: "";
    width: 8px; height: 8px;
    border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 12px currentColor;
  }

  /* When you hover any one node, dim the others */
  .ribbon-nodes:hover .node:not(:hover) { opacity: 0.45; transition: opacity .35s; }

  /* === JOIN BARS === */
  .join-bar {
    display: grid;
    grid-template-columns: 200px 1fr 60px;
    align-items: center;
    gap: 22px;
    padding: 10px 0;
  }
  .join-bar .name {
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    color: var(--ink-quiet);
    text-transform: uppercase;
    letter-spacing: 0.1em;
  }
  .join-bar .track {
    height: 6px;
    border-radius: 999px;
    background: rgba(255, 255, 255, 0.03);
    overflow: hidden;
    position: relative;
  }
  .join-bar .fill {
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, var(--aurora-jade), var(--aurora-cyan), var(--aurora-violet));
    transform-origin: left center;
    animation: fillIn 1.2s var(--ease-settle) both;
    box-shadow: 0 0 12px rgba(78, 192, 255, 0.5);
  }
  .join-bar .count {
    font-family: 'Cormorant Garamond', serif;
    font-weight: 400;
    font-size: 26px;
    color: var(--ink-aurora);
    text-align: right;
  }
  @keyframes fillIn { from { transform: scaleX(0); } to { transform: scaleX(1); } }

  /* === BANNERS === */
  .banner {
    border-radius: var(--radius-md);
    padding: 16px 20px;
    margin-bottom: 24px;
    font-size: 13.5px;
    line-height: 1.55;
    display: flex;
    gap: 14px;
    align-items: flex-start;
    border: 1px solid;
    backdrop-filter: blur(6px);
    -webkit-backdrop-filter: blur(6px);
  }
  .banner .verdict {
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    padding: 4px 10px;
    border-radius: 999px;
    flex: none;
    margin-top: 2px;
  }
  .banner.good { background: var(--good-bg); border-color: rgba(75, 232, 168, 0.22); }
  .banner.good .verdict { color: var(--good); background: rgba(75, 232, 168, 0.14); }
  .banner.warn { background: var(--warn-bg); border-color: rgba(255, 184, 107, 0.22); }
  .banner.warn .verdict { color: var(--warn); background: rgba(255, 184, 107, 0.14); }
  .banner.bad  { background: var(--bad-bg);  border-color: rgba(255, 126, 182, 0.22); }
  .banner.bad  .verdict { color: var(--bad);  background: rgba(255, 126, 182, 0.14); }
  .banner.info { background: var(--info-bg); border-color: rgba(78, 192, 255, 0.22); }
  .banner.info .verdict { color: var(--info); background: rgba(78, 192, 255, 0.14); }
  .banner code { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-aurora); }

  /* === TABLES === */
  .table-wrap {
    border-radius: var(--radius-md);
    overflow: hidden;
    border: 1px solid var(--night-edge);
    background: linear-gradient(180deg, var(--night-rise) 0%, var(--night-rise-2) 100%);
    margin-bottom: 28px;
  }
  table { width: 100%; border-collapse: collapse; }
  thead th {
    text-align: left;
    padding: 14px 18px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.16em;
    color: var(--ink-faint);
    font-weight: 500;
    background: rgba(255, 255, 255, 0.02);
    border-bottom: 1px solid var(--night-edge);
  }
  tbody td {
    padding: 13px 18px;
    border-bottom: 1px solid var(--night-edge);
    font-size: 13.5px;
    vertical-align: middle;
  }
  tbody tr:last-child td { border-bottom: 0; }
  tbody tr:hover td { background: rgba(255, 255, 255, 0.025); }
  td.num, th.num { text-align: right; font-variant-numeric: tabular-nums; }
  td.muted { color: var(--ink-quiet); }
  td.mono  { font-family: 'JetBrains Mono', monospace; font-size: 12px; color: var(--ink-quiet); }
  td strong, td b { font-weight: 500; color: var(--ink-aurora); }

  /* === PILLS === */
  .pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 3px 10px;
    border-radius: 999px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 10px;
    text-transform: uppercase;
    letter-spacing: 0.12em;
    font-weight: 500;
    border: 1px solid transparent;
  }
  .pill::before {
    content: "";
    width: 6px; height: 6px;
    border-radius: 50%;
    background: currentColor;
    box-shadow: 0 0 8px currentColor;
  }
  .pill.matched              { color: var(--good); background: rgba(75, 232, 168, 0.10); border-color: rgba(75, 232, 168, 0.22); }
  .pill.unmatched_focus_only { color: var(--warn); background: rgba(255, 184, 107, 0.10); border-color: rgba(255, 184, 107, 0.22); }
  .pill.unmatched_miq_only   { color: var(--info); background: rgba(78, 192, 255, 0.10);  border-color: rgba(78, 192, 255, 0.22); }
  .pill.no_resource_id       { color: var(--ink-quiet); background: rgba(255, 255, 255, 0.04); border-color: var(--night-edge); }
  .pill.ambiguous            { color: var(--bad);  background: rgba(255, 126, 182, 0.10); border-color: rgba(255, 126, 182, 0.22); }
  .pill.rightsize            { color: var(--warn); background: rgba(255, 184, 107, 0.10); border-color: rgba(255, 184, 107, 0.22); }
  .pill.memory-bound         { color: var(--bad);  background: rgba(255, 126, 182, 0.10); border-color: rgba(255, 126, 182, 0.22); }

  /* === REVEAL / RISE === */
  .rise { animation: riseIn 1s var(--ease-settle) both; }
  .rise.d-1 { animation-delay: .08s; }
  .rise.d-2 { animation-delay: .16s; }
  .rise.d-3 { animation-delay: .26s; }
  .rise.d-4 { animation-delay: .36s; }
  .rise.d-5 { animation-delay: .46s; }
  .rise.d-6 { animation-delay: .58s; }
  @keyframes riseIn {
    from { transform: translateY(28px); opacity: 0; filter: blur(8px); }
    to   { transform: translateY(0);    opacity: 1; filter: blur(0); }
  }

  /* === SQL / CODE === */
  pre.sql {
    background: linear-gradient(180deg, var(--night-rise) 0%, var(--night-rise-2) 100%);
    border: 1px solid var(--night-edge);
    border-radius: var(--radius-md);
    padding: 18px 22px;
    font-family: 'JetBrains Mono', monospace;
    font-size: 12.5px;
    color: var(--ink-quiet);
    overflow-x: auto;
    margin: 12px 0 28px;
    line-height: 1.55;
  }
  code, .mono { font-family: 'JetBrains Mono', monospace; }

  a.subtle {
    color: var(--aurora-cyan);
    text-decoration: none;
    border-bottom: 1px solid transparent;
    transition: border-color .25s;
  }
  a.subtle:hover { border-bottom-color: var(--aurora-cyan); }

  /* === FOOTER === */
  footer.foot {
    width: var(--col-read);
    margin: 0 auto;
    padding: 32px 0 48px;
    border-top: 1px solid var(--night-edge);
    color: var(--ink-faint);
    font-size: 11.5px;
    display: flex;
    justify-content: space-between;
    flex-wrap: wrap;
    gap: 14px;
    font-family: 'JetBrains Mono', monospace;
    letter-spacing: 0.05em;
  }

  /* === REDUCED MOTION === */
  @media (prefers-reduced-motion: reduce) {
    *, *::before, *::after {
      animation-duration: .01ms !important;
      animation-iteration-count: 1 !important;
      transition: none !important;
    }
    .aurora-canvas::before, .aurora-canvas::after { animation: none !important; }
  }

  /* === RESPONSIVE === */
  @media (max-width: 880px) {
    .stat-grid { grid-template-columns: repeat(2, 1fr); }
    .ribbon-nodes { grid-template-columns: 1fr 1fr; gap: 12px; }
    h1.display { font-size: clamp(48px, 12vw, 72px); }
  }
  @media (max-width: 540px) {
    .top-inner { flex-wrap: wrap; }
    .nav { width: 100%; overflow-x: auto; padding-bottom: 4px; }
    .ribbon-nodes { grid-template-columns: 1fr; }
    .stat-grid { grid-template-columns: 1fr 1fr; }
    .join-bar { grid-template-columns: 110px 1fr 40px; gap: 12px; }
  }
</style>
</head>
<body>
  <div class="aurora-canvas" aria-hidden="true"></div>
  <div class="aurora-grain" aria-hidden="true"></div>
  <div class="aurora-vignette" aria-hidden="true"></div>

  <header class="top">
    <div class="top-inner">
      <a class="brand" href="/">
        <span class="brand-mark" aria-hidden="true"></span>
        <span>ENBD</span><span class="small">FinOps</span>
      </a>
      <span class="demo-ribbon">Synthetic</span>
      <nav class="nav" aria-label="Primary">
        <a href="/"                     class="{% if active=='home'         %}active{% endif %}">Overview</a>
        <a href="/views/ai"             class="{% if active=='ai'           %}active{% endif %}">AI cost</a>
        <a href="/views/utilization"    class="{% if active=='utilization'  %}active{% endif %}">Utilization</a>
        <a href="/views/cloud-vs-onprem" class="{% if active=='cloud-vs-onprem' %}active{% endif %}">Cloud &times; on&#8209;prem</a>
        <a href="/views/carbon"         class="{% if active=='carbon'       %}active{% endif %}">Carbon</a>
        <a href="/ai/"                  class="{% if active=='ai-query'     %}active{% endif %}">NL query</a>
      </nav>
    </div>
  </header>

  <main>
    {% block content %}{% endblock %}
  </main>

  <footer class="foot">
    <span>Throwaway PoC for the ENBD EBA innovation sprint &middot; the deliverable is <span style="color:var(--ink-quiet)">GOTCHAS.md</span></span>
    <span>No real ENBD data</span>
  </footer>
</body>
</html>
